<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0726"/>
      <stop offset="100%" stop-color="#060f2a"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="gf" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="200" rx="220" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Shield glow halo -->
  <path d="M256 72 L392 138 L392 272 C392 358 328 416 256 445 C184 416 120 358 120 272 L120 138 Z"
        fill="#7c3aed" opacity="0.2" filter="url(#blur)"/>

  <!-- Shield body -->
  <path d="M256 72 L392 138 L392 272 C392 358 328 416 256 445 C184 416 120 358 120 272 L120 138 Z"
        fill="url(#sg)" filter="url(#gf)" opacity="0.92"/>

  <!-- Shield inner border -->
  <path d="M256 96 L372 154 L372 272 C372 346 316 400 256 426 C196 400 140 346 140 272 L140 154 Z"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- Circuit lines -->
  <g stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.45">
    <line x1="256" y1="232" x2="196" y2="198"/>
    <line x1="256" y1="232" x2="316" y2="198"/>
    <line x1="256" y1="232" x2="228" y2="296"/>
    <line x1="256" y1="232" x2="284" y2="296"/>
    <line x1="256" y1="232" x2="256" y2="168"/>
    <line x1="196" y1="198" x2="172" y2="214"/>
    <line x1="316" y1="198" x2="340" y2="214"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#a78bfa" opacity="0.7">
    <circle cx="196" cy="198" r="5"/>
    <circle cx="228" cy="296" r="5"/>
    <circle cx="256" cy="168" r="5"/>
    <circle cx="172" cy="214" r="4"/>
  </g>
  <g fill="#67e8f9" opacity="0.7">
    <circle cx="316" cy="198" r="5"/>
    <circle cx="284" cy="296" r="5"/>
    <circle cx="340" cy="214" r="4"/>
  </g>

  <!-- Keyhole circle -->
  <circle cx="256" cy="238" r="38" fill="rgba(8,6,24,0.88)"/>
  <circle cx="256" cy="238" r="38" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>

  <!-- Keyhole stem -->
  <path d="M244 268 L244 310 Q244 318 252 318 L260 318 Q268 318 268 310 L268 268 Z"
        fill="rgba(8,6,24,0.88)"/>
  <path d="M244 268 L244 310 Q244 318 252 318 L260 318 Q268 318 268 310 L268 268 Z"
        fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>

  <!-- Top shine -->
  <path d="M256 96 L372 154 L372 200 C310 185 202 185 140 200 L140 154 Z"
        fill="rgba(255,255,255,0.06)"/>
</svg>
